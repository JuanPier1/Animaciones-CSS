<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio JP</title>
<link rel="stylesheet" href="index.css">
<link rel="icon" ype="image/svg+xml" href="Assets/bearicon.svg">
</head>
<body class="parallax-background">
    <nav class="nav-background">
        <a class="logo">
            <img src="Assets/bearicon.svg" alt="Logo">
        </a>
        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <ul class="nav-links">
            <li class="border-rainbow">
                <a href="index.html">
                    <span class="icon">🏠</span>
                    <span>Inicio</span>
                </a>
            </li>
            <li class="border-rainbow">
                <a href="">
                    <span class="icon">🖥️</span>
                    <span>Mensaje</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="background-layer"></div>
    <div class="container" id="container">
        <div>
            <h1 class="title">Práctica animaciones CSS & JS</h1>
        </div>
        <div class="frameContainer animated-gradient">
            <iframe src="Assets/ascii.html" id="iframe" title="ASCII" scrolling="no" frameborder="0"></iframe>
        </div>
        <div class="music-player">
            <iframe 
                data-testid="embed-iframe" 
                style="border-radius:12px" 
                src="https://open.spotify.com/embed/playlist/37i9dQZF1E8OW2uODT8ELJ?utm_source=generator&theme=0" 
                width="60%" height="152" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>
    </div>
<!-- Modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-window">
            <button id="modal-close" class="modal-button">✕</button>
            <h2>Ventana modal</h2>
            <p>¡Hola! esto es un mensaje.</p>
        </div>
    </div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="animation-words.js"></script>
<script src="animation-symbols.js"></script>
<script>
    // Abrir
    $('a:contains("Mensaje")').on('click', function(e) {
        e.preventDefault();
        $('#modal-overlay').css('display', 'flex');
    });

    // Cerrar con botón
    $('#modal-close').on('click', function() {
        $('#modal-overlay').hide();
    });

    // Cerrar al click fuera
    $('#modal-overlay').on('click', function(e) {
        if ($(e.target).is('#modal-overlay')) {
            $('#modal-overlay').hide();
        }
    });
</script>
</body>
</html>
